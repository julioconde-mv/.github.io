<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mavima — Cibersegurança, IA Corporativa & Infraestrutura</title>
<meta name="description" content="Mavima protege e transforma empresas com cibersegurança, IA aplicada ao negócio e infraestrutura cloud. Monitoramento 24/7, ISO 27001 e muito mais.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #09090b;
    --bg2:      #0f0f12;
    --bg3:      #141418;
    --surface:  #18181d;
    --surface2: #1f1f26;
    --border:   rgba(255,255,255,0.07);
    --border2:  rgba(255,255,255,0.12);
    --orange:        #FF9100;
    --orange-dim:    rgba(255,145,0,0.12);
    --orange-glow:   rgba(255,145,0,0.28);
    --purple:        #73009C;
    --purple-light:  #9b30cc;
    --purple-dim:    rgba(115,0,156,0.15);
    --purple-glow:   rgba(115,0,156,0.3);
    --cyan:          #00C9D4;
    --cyan-dim:      rgba(0,201,212,0.12);
    --cyan-glow:     rgba(0,201,212,0.25);
    --text:  #f0eee8;
    --text2: #9c9a8e;
    --text3: #5e5c55;
    --success: #22c58b;
    --danger:  #ff4757;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body:    'Inter', sans-serif;
    --radius:    10px;
    --radius-lg: 16px;
    --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); line-height: 1.7; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: .5;
  }
  .grid-bg {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255,145,0,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,145,0,0.025) 1px, transparent 1px);
    background-size: 56px 56px; pointer-events: none;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 0 40px; height: 68px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(9,9,11,0.88); backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border); transition: box-shadow var(--transition);
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-fallback { font-family: var(--font-display); font-weight: 800; font-size: 22px; color: var(--orange); letter-spacing: -0.5px; }
  .nav-links { display: flex; align-items: center; gap: 28px; list-style: none; }
  .nav-links a { font-size: 14px; font-weight: 500; color: var(--text2); text-decoration: none; transition: color var(--transition); }
  .nav-links a:hover { color: var(--text); }
  .nav-cta { background: var(--orange) !important; color: #000 !important; padding: 8px 20px; border-radius: 6px; font-weight: 700 !important; font-size: 13px !important; transition: opacity var(--transition) !important; text-decoration: none; }
  .nav-cta:hover { opacity: .85 !important; }

  /* HERO */
  #hero { position: relative; min-height: 100vh; display: flex; align-items: center; padding: 120px 40px 80px; overflow: hidden; }
  .hero-glow { position: absolute; top: -180px; right: -180px; width: 660px; height: 660px; background: radial-gradient(circle, rgba(255,145,0,0.09) 0%, transparent 65%); pointer-events: none; }
  .hero-glow2 { position: absolute; bottom: -80px; left: -80px; width: 480px; height: 480px; background: radial-gradient(circle, rgba(115,0,156,0.08) 0%, transparent 70%); pointer-events: none; }
  .hero-inner { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 72px; align-items: center; }
  .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--orange-dim); border: 1px solid rgba(255,145,0,0.25); border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 600; color: var(--orange); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 22px; }
  .hero-badge::before { content: ''; width: 6px; height: 6px; background: var(--orange); border-radius: 50%; box-shadow: 0 0 6px var(--orange); animation: pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
  h1 { font-family: var(--font-display); font-size: clamp(36px,5vw,58px); font-weight: 800; line-height: 1.08; letter-spacing: -1.5px; color: var(--text); margin-bottom: 20px; }
  h1 em { font-style: normal; color: var(--orange); }
  .hero-sub { font-size: 17px; color: var(--text2); font-weight: 300; line-height: 1.75; margin-bottom: 28px; max-width: 460px; }
  .hero-pillars { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 32px; }
  .hero-pillar { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--text3); border: 1px solid var(--border2); border-radius: 20px; padding: 4px 12px; }
  .hero-pillar-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .hero-pillar-dot.orange { background: var(--orange); box-shadow: 0 0 5px var(--orange); }
  .hero-pillar-dot.purple { background: var(--purple-light); box-shadow: 0 0 5px var(--purple-light); }
  .hero-pillar-dot.cyan { background: var(--cyan); box-shadow: 0 0 5px var(--cyan); }
  .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .btn-primary { display: inline-flex; align-items: center; gap: 10px; background: var(--orange); color: #000; font-family: var(--font-body); font-weight: 700; font-size: 15px; padding: 13px 26px; border-radius: var(--radius); text-decoration: none; border: none; cursor: pointer; transition: all var(--transition); }
  .btn-primary:hover { background: #ffaa33; transform: translateY(-1px); box-shadow: 0 8px 32px var(--orange-glow); }
  .btn-ghost { display: inline-flex; align-items: center; gap: 8px; background: transparent; color: var(--text2); font-family: var(--font-body); font-weight: 500; font-size: 15px; padding: 13px 22px; border-radius: var(--radius); text-decoration: none; border: 1px solid var(--border2); transition: all var(--transition); }
  .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,.24); background: rgba(255,255,255,.04); }
  .hero-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 30px; position: relative; overflow: hidden; }
  .hero-panel::before { content: ''; position: absolute; top:0; left:0; right:0; height:2px; background: linear-gradient(90deg, transparent, var(--orange), var(--purple), transparent); }
  .panel-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 18px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .stat-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .stat-value { font-family: var(--font-display); font-size: 26px; font-weight: 800; color: var(--orange); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 11px; color: var(--text3); line-height: 1.4; }
  .panel-alert { display: flex; align-items: flex-start; gap: 12px; background: rgba(255,71,87,.08); border: 1px solid rgba(255,71,87,.2); border-radius: var(--radius); padding: 13px; }
  .alert-dot { width: 8px; height: 8px; background: var(--danger); border-radius: 50%; box-shadow: 0 0 8px var(--danger); margin-top: 5px; flex-shrink: 0; animation: pulse-dot 1.5s ease-in-out infinite; }
  .alert-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .alert-text strong { color: var(--danger); font-weight: 600; }

  /* SECTION */
  section { position: relative; padding: 96px 40px; }
  .section-inner { max-width: 1100px; margin: 0 auto; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--orange); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 10px; }
  h2 { font-family: var(--font-display); font-size: clamp(26px,3.5vw,42px); font-weight: 800; letter-spacing: -1px; line-height: 1.12; margin-bottom: 14px; color: var(--text); }
  .section-desc { font-size: 17px; color: var(--text2); font-weight: 300; max-width: 520px; margin-bottom: 52px; line-height: 1.75; }

  /* TORRES — VISÃO GERAL */
  #torres { background: var(--bg2); }
  .towers-overview { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-bottom: 64px; }
  .tower-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 28px; position: relative; overflow: hidden; transition: all var(--transition);
    cursor: pointer; text-decoration: none; display: block;
  }
  .tower-card:hover { transform: translateY(-4px); box-shadow: 0 20px 56px rgba(0,0,0,.5); }
  .tower-card::before { content: ''; position: absolute; top:0; left:0; right:0; height:3px; }
  .tower-card.t1::before { background: linear-gradient(90deg, var(--orange), #ffaa33); }
  .tower-card.t1:hover { border-color: rgba(255,145,0,.3); }
  .tower-card.t2::before { background: linear-gradient(90deg, var(--purple-light), #c060ff); }
  .tower-card.t2:hover { border-color: rgba(155,48,204,.3); }
  .tower-card.t3::before { background: linear-gradient(90deg, var(--cyan), #60e0e8); }
  .tower-card.t3:hover { border-color: rgba(0,201,212,.3); }
  .tower-num { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 14px; }
  .t1 .tower-num { color: var(--orange); }
  .t2 .tower-num { color: var(--purple-light); }
  .t3 .tower-num { color: var(--cyan); }
  .tower-icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
  .t1 .tower-icon { background: var(--orange-dim); border: 1px solid rgba(255,145,0,.2); }
  .t2 .tower-icon { background: var(--purple-dim); border: 1px solid rgba(115,0,156,.25); }
  .t3 .tower-icon { background: var(--cyan-dim); border: 1px solid rgba(0,201,212,.2); }
  .tower-icon svg { width: 22px; height: 22px; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .t1 .tower-icon svg { stroke: var(--orange); }
  .t2 .tower-icon svg { stroke: var(--purple-light); }
  .t3 .tower-icon svg { stroke: var(--cyan); }
  .tower-card h3 { font-family: var(--font-display); font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 8px; line-height: 1.25; }
  .tower-card p { font-size: 13.5px; color: var(--text2); line-height: 1.65; margin-bottom: 18px; }
  .tower-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tower-tag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .t1 .tower-tag { color: var(--orange); background: var(--orange-dim); }
  .t2 .tower-tag { color: var(--purple-light); background: var(--purple-dim); }
  .t3 .tower-tag { color: var(--cyan); background: var(--cyan-dim); }

  /* TORRE 1 — INFRAESTRUTURA */
  #torre1 { background: var(--bg); }
  .t1-accent { color: var(--orange); }
  .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap: 18px; }
  .service-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 26px; transition: all var(--transition); position: relative; overflow: hidden; }
  .service-card::after { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity var(--transition); border-radius: inherit; }
  .service-card.sc-orange::after { background: linear-gradient(135deg, var(--orange-dim) 0%, transparent 55%); }
  .service-card.sc-purple::after { background: linear-gradient(135deg, var(--purple-dim) 0%, transparent 55%); }
  .service-card.sc-cyan::after { background: linear-gradient(135deg, var(--cyan-dim) 0%, transparent 55%); }
  .service-card:hover { transform: translateY(-3px); box-shadow: 0 16px 48px rgba(0,0,0,.45); }
  .service-card.sc-orange:hover { border-color: rgba(255,145,0,.28); }
  .service-card.sc-orange:hover::after { opacity: 1; }
  .service
